<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
        h1 { color: #0F2443; text-align: center; }
        .form-container { background: #F8FAFC; padding: 24px; border-radius: 8px; border: 1px solid #E2E8F0; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #334155; font-weight: bold; }
        input[type="password"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #CBD5E1; border-radius: 4px; }
        button { width: 100%; background: #14B8A6; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; margin-top: 10px; font-weight: bold; }
        button:hover { background: #0D9488; }
        .error { color: #EF4444; background: #FEE2E2; padding: 10px; border-radius: 4px; margin-bottom: 16px; text-align: center; border: 1px solid #FCA5A5; }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #64748B; }
        .back-link:hover { color: #0F2443; }
    </style>
</head>
<body>
    <h1>修改密碼</h1>
    <p style="text-align: center; color: #64748B;">醫師：<span th:text="${loggedInDoctorName}"></span></p>

    <div class="form-container">
        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

        <form th:action="@{/password}" th:object="${passwordForm}" method="post">
            <div class="form-group">
                <label for="oldPassword">舊密碼</label>
                <input type="password" id="oldPassword" th:field="*{oldPassword}" required>
            </div>
            <div class="form-group">
                <label for="newPassword">新密碼</label>
                <input type="password" id="newPassword" th:field="*{newPassword}" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">確認新密碼</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required>
            </div>
            <button type="submit">確認修改</button>
        </form>
    </div>

    <a class="back-link" th:href="@{/dashboard}">← 返回 Dashboard</a>
</body>
</html>
