<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號統計 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        .filter { margin: 20px 0; }
        .filter a { display: inline-block; padding: 6px 14px; margin: 4px; background: #E2E8F0; color: #0F2443; text-decoration: none; border-radius: 4px; }
        .filter a.active { background: #14B8A6; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #0F2443; color: white; }
        tr:hover { background: #F8FAFC; }
    </style>
</head>
<body>
    <h1>掛號統計資訊</h1>
        
    <h3>基本概況</h3>
    <ul>
        <li>
            醫師總數:
            <span th:text="${doctorCount}">0</span>
        </li>
        <li>
            病患總數:
            <span th:text="${patientCount}">0</span>
        </li>
        <li>
            掛號總數:
            <span th:text="${appointmentCount}">0</span>
        </li>
    </ul>

    <h3>依科別分組的掛號數</h3>
    <table>
        <thead>
            <tr>
                <th>科別</th>
                <th>掛號數量</th>
            </tr>
        </thead>
        <tbody>
            <!-- 跌代 Map 中的每一組 Key (科別) 與 Value (數量) -->
            <tr th:each="entry : ${deptStats}">
                <td th:text="${entry.key}">科別名稱</td>
                <td th:text="${entry.value}">0</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
